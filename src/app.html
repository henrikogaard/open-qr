<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1d2021" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fbf9f4" media="(prefers-color-scheme: light)" />
    <meta name="description" content="Open-QR — self-hosted, privacy-first QR generator with optional auth, analytics and admin tools." />
    <title>Open-QR</title>

    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />

    <script>
      // Apply theme before first paint to avoid FOUC.
      (function () {
        try {
          var saved = localStorage.getItem('open-qr-theme');
          var mode = saved || 'system';
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = mode === 'dark' || (mode === 'system' && prefersDark);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
